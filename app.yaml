apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:  java-argocd
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/leonantivo/argocd-test.git
    targetRevision: HEAD
    path: dev

  destination:
    server: https://kubernetes.default.svc
    namespace: my-springbootapp-argocd
  
  syncPolicy:
    syncOptions: 
      - CreateNamespace=true

    automated:
      prune: true
      selfHeal: true