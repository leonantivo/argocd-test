apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:  java-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/leonantivo/argocd-test.git
    targetRevision: HEAD
    path: argocd-test
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true